$kind: http-request
name: List Áreas de Estudio - Happy
method: GET
url: '{{baseUrl}}/core/areas-estudio/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response tiene estructura paginada", () => {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('results');
          pm.expect(jsonData.results).to.be.an('array');
      });
      pm.test("Array de resultados no está vacío", () => {
          pm.expect(pm.response.json().results.length).to.be.above(0);
      });
