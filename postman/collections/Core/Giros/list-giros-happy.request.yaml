$kind: http-request
name: List Giros - Happy
method: GET
url: '{{baseUrl}}/core/giros/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Response es array", () => pm.expect(pm.response.json()).to.be.an('array'));
      pm.test("Array no está vacío", () => pm.expect(pm.response.json().length).to.be.above(0));
