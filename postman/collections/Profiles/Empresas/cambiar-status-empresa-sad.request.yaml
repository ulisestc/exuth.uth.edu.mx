$kind: http-request
name: Cambiar Status Empresa por Empresa (Sad - RBAC)
method: PATCH
url: '{{baseUrl}}/profiles/empresas/{{empresaId}}/cambiar_status/'
order: 7100
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "aprobada"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("empresaAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 403 - Empresa no puede cambiar su propio estatus", function () {
          pm.response.to.have.status(403);
      });
