$kind: http-request
name: Update Empresa por Admin (Happy - RBAC)
method: PUT
url: '{{baseUrl}}/profiles/empresas/{{empresaId}}/'
order: 8100
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Tech Solutions SA de CV",
      "domicilio": "Blvd. Everardo Márquez 123, Pachuca, Hidalgo",
      "telefono": "7719876543",
      "correo_contacto": "contacto@techsolutions.com",
      "actividad_de_la_empresa": "Desarrollo de software y consultoría",
      "campo": "Tecnología",
      "giro": 1,
      "sector": 1
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("adminAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Admin edita perfil de empresa", function () {
          pm.response.to.have.status(200);
      });
