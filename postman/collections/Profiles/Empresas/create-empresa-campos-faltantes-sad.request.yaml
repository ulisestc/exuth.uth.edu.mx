$kind: http-request
name: Create Empresa Campos Faltantes (Sad)
method: POST
url: '{{baseUrl}}/profiles/empresas/'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "telefono": "7719876543"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
          pm.response.to.have.status(400);
      });
