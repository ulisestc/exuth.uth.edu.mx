$kind: http-request
name: Create Empresa Perfil Duplicado (Sad - OneToOne)
method: POST
url: '{{baseUrl}}/profiles/empresas/'
order: 6200
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Segunda Empresa Falsa",
      "domicilio": "Calle Falsa 456",
      "telefono": "7710000000",
      "correo_contacto": "segunda@empresa.com",
      "actividad_de_la_empresa": "Software",
      "campo": "Tecnología",
      "giro": 1,
      "sector": 1
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("empresaAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 400 - Perfil de empresa ya existe para esta cuenta", function () {
          pm.response.to.have.status(400);
      });
