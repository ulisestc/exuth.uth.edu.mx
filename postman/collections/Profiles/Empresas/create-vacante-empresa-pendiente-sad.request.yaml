$kind: http-request
name: Create Vacante Empresa Pendiente (Sad - RBAC)
method: POST
url: '{{baseUrl}}/vacantes/'
order: 7150
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "titulo": "Vacante Empresa No Aprobada",
      "nivel_estudios": "Licenciatura",
      "edad_minima": 22,
      "edad_maxima": 35,
      "sexo": "Indistinto",
      "estado_civil": "Soltero",
      "experiencia": "Testing",
      "funciones_y_actividades": "Testing",
      "habilidades_y_competencias": "Testing",
      "transporte": "Transporte público",
      "oferta_laboral": "Testing",
      "sueldo_minimo": "8000.00",
      "sueldo_maximo": "12000.00",
      "horario": {"lunes": "09:00-18:00"},
      "entrevistador": "Ing. Test",
      "confidencial": false,
      "area_estudio": 1,
      "idiomas": []
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("empresaAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 403 - Empresa pendiente no puede crear vacante", function () {
          pm.response.to.have.status(403);
      });
