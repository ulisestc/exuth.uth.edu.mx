$kind: http-request
name: Create Egresado Perfil Duplicado (Sad - OneToOne)
method: POST
url: '{{baseUrl}}/profiles/egresados/'
order: 6200
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "matricula": "UTH2021002",
      "curp": "NEWCURP1234567890",
      "telefono": "7710000000",
      "carrera": 1
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("egresadoAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 400 - Perfil de egresado ya existe para esta cuenta", function () {
          pm.response.to.have.status(400);
      });
