$kind: http-request
name: Create Egresado Rol Inválido (Sad - RBAC)
method: POST
url: '{{baseUrl}}/profiles/egresados/'
order: 6100
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "matricula": "UTH9999999",
      "curp": "FAKE123456HDFXXX09",
      "telefono": "7710000000",
      "carrera": 1
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("empresaAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 403 - Empresa no puede crear perfil de Egresado", function () {
          pm.response.to.have.status(403);
      });
