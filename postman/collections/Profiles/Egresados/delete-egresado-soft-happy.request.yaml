$kind: http-request
name: Delete Egresado Soft (Happy)
method: DELETE
url: '{{baseUrl}}/profiles/egresados/{{egresadoId}}/'
order: 10000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("egresadoAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
