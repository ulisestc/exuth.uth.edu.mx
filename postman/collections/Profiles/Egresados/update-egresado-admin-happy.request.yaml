$kind: http-request
name: Update Egresado por Admin (Happy - RBAC)
method: PUT
url: '{{baseUrl}}/profiles/egresados/{{egresadoId}}/'
order: 8100
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "matricula": "UTH2021001",
      "curp": "ABCD123456HDFXXX01",
      "telefono": "7719998888",
      "carrera": 1
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("adminAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Admin edita perfil de egresado", function () {
          pm.response.to.have.status(200);
      });
