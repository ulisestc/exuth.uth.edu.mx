$kind: http-request
name: Update Egresado (Happy)
method: PUT
url: '{{baseUrl}}/profiles/egresados/{{egresadoId}}/'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "user": 1,
      "matricula": "UTH2021001",
      "curp": "ABCD123456HDFXXX01",
      "telefono": "7719999999",
      "carrera": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
