$kind: http-request
name: 'Refresh Token Inválido - Sad Path'
method: POST
url: '{{baseUrl}}/auth/jwt/refresh/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refresh": "token.invalido.aqui"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 401 - Token inválido rechazado", function () {
          pm.response.to.have.status(401);
      });
      pm.test("Response contiene mensaje de error", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("detail");
      });
