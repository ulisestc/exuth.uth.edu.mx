$kind: http-request
name: Login Empresa 2 - Happy Path
method: POST
url: "{{baseUrl}}/auth/jwt/create/"
order: 2500
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "empresa2@test.com",
      "password": "TestPass123!"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status 200 - Login empresa 2 exitoso", function () {
          pm.response.to.have.status(200);
      });
      if (pm.response.code === 200) {
          const json = pm.response.json();
          pm.environment.set("empresa2AccessToken", json.access);
      }
    language: text/javascript
