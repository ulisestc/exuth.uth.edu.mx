$kind: http-request
name: Get Vacante (Happy)
method: GET
url: '{{baseUrl}}/vacantes/{{vacanteId}}/'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Tiene campos requeridos", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property('titulo');
          pm.expect(json).to.have.property('nivel_estudios');
          pm.expect(json).to.have.property('sueldo_minimo');
          pm.expect(json).to.have.property('sueldo_maximo');
          pm.expect(json).to.have.property('idiomas');
      });
