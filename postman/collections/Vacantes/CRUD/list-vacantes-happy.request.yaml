$kind: http-request
name: List Vacantes (Happy)
method: GET
url: '{{baseUrl}}/vacantes/'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response es paginado y tiene resultados", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property('results');
          pm.expect(json.results).to.be.an('array');
      });
