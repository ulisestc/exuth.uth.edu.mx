$kind: http-request
name: List Postulaciones Empresa (Happy)
method: GET
url: '{{baseUrl}}/vacantes/postulaciones/'
order: 5500
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("empresaAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response es paginado y contiene postulaciones para sus vacantes", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property('results');
          pm.expect(json.results).to.be.an('array');
          pm.expect(json.results.length).to.be.above(0);
      });
