$kind: http-request
name: Delete Postulacion (Happy)
method: DELETE
url: '{{baseUrl}}/vacantes/postulaciones/{{postulacionId}}/'
order: 5900
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("egresadoAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 204 - Postulacion eliminada", function () {
          pm.response.to.have.status(204);
      });
