$kind: http-request
name: Update Postulacion Estado Egresado (Sad - RBAC)
method: PATCH
url: '{{baseUrl}}/vacantes/postulaciones/{{postulacionId}}/'
order: 5800
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "estado": "Rechazada"
    }
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      pm.environment.set("accessToken", pm.environment.get("egresadoAccessToken"));
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 403 - Egresado no puede cambiar estado", function () {
          pm.response.to.have.status(403);
      });
