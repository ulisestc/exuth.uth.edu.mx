$kind: http-request
name: 'Create Vacante: sueldo_minimo > sueldo_maximo (Sad)'
method: POST
url: '{{baseUrl}}/vacantes/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "titulo": "Vacante Inválida",
      "nivel_estudios": "Licenciatura",
      "edad_minima": 22,
      "edad_maxima": 35,
      "sexo": "Indistinto",
      "estado_civil": "Soltero",
      "experiencia": "1 año de experiencia",
      "funciones_y_actividades": "Funciones varias",
      "habilidades_y_competencias": "Habilidades varias",
      "transporte": "Transporte público",
      "oferta_laboral": "Prestaciones de ley",
      "sueldo_minimo": "15000.00",
      "sueldo_maximo": "8000.00",
      "horario": {"lunes": "09:00-18:00"},
      "entrevistador": "Ing. García",
      "confidencial": false,
      "area_estudio": 1,
      "idiomas": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 400", function () {
          pm.response.to.have.status(400);
      });
      pm.test("Mensaje de error sobre sueldo", function () {
          var body = pm.response.text();
          pm.expect(body.toLowerCase()).to.include("sueldo");
      });
